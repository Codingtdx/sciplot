name: ci

on:
  push:
  pull_request:

jobs:
  desktop-and-python:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest ruff mypy coverage httpx pre-commit

      - name: Install desktop dependencies
        working-directory: app/desktop
        run: npm ci

      - name: Ruff
        run: .venv/bin/python -m ruff check app/sidecar make_plot.py src/composer.py src/plot_contract.py src/data_loader.py src/tensile_replicates.py src/rendering tests scripts/smoke_check.py

      - name: Mypy
        run: .venv/bin/python -m mypy src/composer.py src/plot_contract.py src/data_loader.py src/tensile_replicates.py src/rendering

      - name: Python tests
        run: .venv/bin/python -m pytest tests

      - name: Python smoke check
        run: .venv/bin/python scripts/smoke_check.py

      - name: Desktop tests
        working-directory: app/desktop
        run: npm test

      - name: Install Playwright browser
        working-directory: app/desktop
        run: npm run e2e:install

      - name: Desktop E2E
        working-directory: app/desktop
        run: npm run test:e2e

      - name: Desktop build
        working-directory: app/desktop
        run: npm run build

      - name: Tauri cargo check
        working-directory: app/desktop/src-tauri
        run: cargo check
