name: ci

on:
  push:
  pull_request:

jobs:
  desktop-and-python:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -c requirements-constraints.txt pytest ruff mypy coverage httpx pre-commit

      - name: Ruff
        run: .venv/bin/python -m ruff check app/sidecar make_plot.py src/composer.py src/plot_contract.py src/data_loader.py src/tensile_replicates.py src/rendering tests scripts/smoke_check.py

      - name: Mypy
        run: .venv/bin/python -m mypy src/composer.py src/plot_contract.py src/data_loader.py src/tensile_replicates.py src/rendering

      - name: Python tests
        run: .venv/bin/python -m pytest tests

      - name: Python smoke check
        run: .venv/bin/python scripts/smoke_check.py

      - name: Native macOS build
        run: |
          xcodebuild \
            -project app/macos/SciPlot.xcodeproj \
            -scheme SciPlotMac \
            -destination 'platform=macOS' \
            -derivedDataPath app/macos/.derivedData \
            build

      - name: Native macOS tests
        run: |
          xcodebuild \
            -project app/macos/SciPlot.xcodeproj \
            -scheme SciPlotMac \
            -destination 'platform=macOS' \
            -derivedDataPath app/macos/.derivedData \
            -only-testing:SciPlotMacTests/SchemaDecodingTests \
            -only-testing:SciPlotMacTests/PlotSessionTests \
            -only-testing:SciPlotMacTests/SidecarRuntimeTests \
            test
