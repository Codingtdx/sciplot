[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  "app/desktop",
  "app/desktop/src-tauri/target",
  "figures",
]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"scripts/smoke_check.py" = ["E402"]
"scripts/debug_refresh.py" = ["E402"]

[tool.coverage.run]
source = ["src", "app/sidecar"]
branch = true

[tool.coverage.report]
skip_empty = true
show_missing = true

[tool.mypy]
python_version = "3.11"
files = [
  "src/composer.py",
  "src/plot_contract.py",
  "src/data_loader.py",
  "src/tensile_replicates.py",
  "src/rendering",
]
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
no_implicit_optional = true
namespace_packages = true
explicit_package_bases = true
follow_imports = "skip"
